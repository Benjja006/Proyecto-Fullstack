# 1. Identificación del Microservicio
spring.application.name=User-Service-Personal
# Usamos el 8082 porque el Auth usa el 8081
server.port=8082

# 2. Conexión a la Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/garzonpro_users?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Configuración de JPA (Hibernate)
# Importante: 'none' para que Flyway se encargue de las tablas
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. Activación de Flyway (Punto 3 de tu tarea)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# 5. Configuración de Circuit Breaker (Resilience4j)
resilience4j.circuitbreaker.instances.usuarioService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.usuarioService.slidingWindowSize=10
