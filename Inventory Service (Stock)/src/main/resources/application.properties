# Nombre del Microservicio
spring.application.name=Inventory-Service-Stock

# Puerto (Usamos el 8083 para evitar choques con Auth y User)
server.port=8083

# Configuración de la Base de Datos (MySQL)
# 'createDatabaseIfNotExist=true' es clave para que funcione en el PC del instituto sin crear la BD a mano
spring.datasource.url=jdbc:mysql://localhost:3306/garzonpro_inventory?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=root

#Configuración de JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuración de Flyway (Migraciones automáticas)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Desactivar Banner de inicio para una consola más limpia
spring.main.banner-mode=off

# Configuración de Logs (Para ver errores detallados si algo falla)
logging.level.org.springframework.web=INFO
logging.level.com.ProyectoRestaurant.inventory=DEBUG