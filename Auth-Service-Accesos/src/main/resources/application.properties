# 1. Identificación del Microservicio
spring.application.name=Auth-Service-Accesos
server.port=8081

# 2. Conexión a la Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/garzonpro_auth?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Configuración de JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# 4. ACTIVACIÓN DE FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Evita errores si la base de datos ya tenía tablas previas
spring.flyway.baseline-on-migrate=true
# Permite que Flyway cree la tabla de control si está vacía
spring.flyway.validate-on-migrate=true